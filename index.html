<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flor de Lótus | Essência e Resiliência</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar" role="navigation" aria-label="Menu Principal">
            <div class="logo">Lótus<span>Essence</span></div>
            <div class="acc-controls">
                <button onclick="changeFontSize(1)" aria-label="Aumentar fonte">A+</button>
                <button onclick="changeFontSize(-1)" aria-label="Diminuir fonte">A-</button>
                <button onclick="toggleContrast()" id="contrast-toggle" aria-label="Alternar Alto Contraste">◐</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero reveal">
            <div class="hero-content">
                <h1>A Beleza que Emerge do Lodo</h1>
                <p>Descubra o simbolismo, a biologia e a paz por trás da flor mais resiliente da natureza.</p>
            </div>
        </section>

        <section class="container reveal">
            <h2 class="section-title">Variedades Magníficas</h2>
            <div id="lotus-grid" class="grid-container">
                </div>
        </section>

        <section class="container reveal">
            <h2 class="section-title">Ciência e Simbolismo</h2>
            <div id="faq-container" class="expandable-list">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Jornada da Lótus - Experiência Digital Imersiva</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
